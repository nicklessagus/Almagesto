# Registro de TEMAS para ingest-topic (análogo a stars.yaml, pero por tema en vez de por estrella).
#
# La clave de cada entrada ES el slug → dir de build/<slug>/ y raw/{pdfs,fulltext}/<slug>/.
# Campos:
#   title    : nombre humano del tema.
#   area     : subcarpeta de vault/wiki/concepts/. ABIERTA — cualquiera; idealmente una de
#              `concept_areas` (objective.yaml; ej. indicators|methods|activity|hypotheses) para que
#              el typo-check la reconozca. Si no figura, make_notes AVISA pero crea igual (no bloquea)
#              y el lint la marca WARN; si es un área nueva real, agregala a concept_areas.
#   concept  : nombre de la nota concept durable destino (puede diferir del slug; existente o a stubbear).
#   query    : query Solr ADS CRUDA (control total; ver scripts/query_ads.py). NO es por nombre de estrella.
#   aliases  : opcional, sólo para prosa.
#   extra_core : opcional, lista de bibcodes a forzar como core (curación manual que el clasificador
#                perdió). query_ads los trae por bibcode (`via: manual`) y los mergea. Persistente
#                (config se commitea), a diferencia de editar build/ (scratch, se pisa).
#                En un tema OFF-ADS también vale (tema MIXTO): los papers del tema que SÍ tienen
#                bibcode ADS van acá — NO en sources: con el bibcode de key (degrada el stub:
#                metadata a mano, blockquote off-ADS falso). ingest_topic les corre la sub-cadena ADS.
#   source   : de dónde sale la bibliografía (default si falta: ads). Valores:
#              ads | web | local-pdfs | local-pdfs+web. Todo lo no-ads es el modo off-ADS de
#              ingest-topic (opt-in, sólo a pedido explícito) y requiere `sources:` y `query: null`.
#   sources  : (sólo off-ADS) la bibliografía declarada del tema. Cada item:
#                - key: 2006RasmussenWilliams       # clave de cita sintética AAAA+Autor (obligatoria)
#                  url: https://...            # fuente web (snapshot vía fetch_web/defuddle) — o bien
#                  pdf: ~/ruta/al/archivo.pdf  # PDF provisto (se copia a raw/pdfs/<slug>/<key>.pdf)
#                  title/author/year/venue     # opcionales: metadata para la nota de paper
#                  n_authors/doi               # opcionales: nº de autores; DOI si existe (un PDF con
#                                              # DOI sigue siendo off-ADS — sin bibcode ADS — y el DOI
#                                              # habilita el chequeo de retracciones vía Crossref)
#                  pending: paywall            # la fuente NO se pudo conseguir todavía (paywall |
#                                              # scan | unextractable): en vez de url/pdf obtenible,
#                                              # el item queda DERIVADO al usuario — se stubbea la
#                                              # nota con pending_source (url/doi como puntero), no
#                                              # cuenta como fallo y el lint lo lista. Al conseguir
#                                              # la fuente: reemplazar por pdf:/url: y re-correr.
#
# La cadena mecánica se corre con `python scripts/ingest_topic.py <slug>` (despacha según `source`).
#
# Agregá tus temas acá (o dejá que `ingest-topic` los agregue). Ejemplo comentado:
#
# activity-rv:
#   title: "Actividad estelar ↔ velocidad radial (indicadores, signos, desfasajes)"
#   area: activity
#   concept: activity-rv-degeneracy
#   query: '(abs:"radial velocity" OR abs:"radial-velocity") (abs:"planet" OR abs:"exoplanet") (abs:"bisector" OR abs:"FWHM" OR abs:"S-index" OR abs:"activity indicator" OR abs:"chromospheric")'
#   aliases: ["BIS-RV", "indicadores de actividad"]
#
# Ejemplo off-ADS (método no-astro que se quiere usar en la bóveda; ver Modo off-ADS del skill ingest-topic):
#
# gaussian-processes:
#   title: "Procesos gaussianos (regresión: algoritmo y kernels)"
#   area: methods
#   concept: gaussian-processes
#   query: null
#   source: local-pdfs+web
#   aliases: ["GP", "gaussian process regression", "procesos gaussianos"]
#   sources:
#     - key: 2006RasmussenWilliams
#       pdf: ~/Descargas/rasmussen_williams_2006.pdf
#       title: "Gaussian Processes for Machine Learning"
#       author: Rasmussen
#       year: 2006
#     - key: 2025sklearn
#       url: https://scikit-learn.org/stable/modules/gaussian_process.html
#       title: "scikit-learn User Guide: Gaussian Processes"
#       venue: scikit-learn.org
#       year: 2025
