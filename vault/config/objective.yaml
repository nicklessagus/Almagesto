# ─────────────────────────────────────────────────────────────────────────────
# OBJETIVO de la bóveda  ·  EDITÁ ESTE ARCHIVO para instanciar tu propia wiki.
#
# Es el único archivo que define "de qué trata" esta bóveda. Controla:
#   1) el encuadre que lee el agente (name/short/description),
#   2) qué paper es "core" = `relevance.topics` (el clasificador de relevancia).
#
# Viene pre-cargado con el ejemplo canónico (actividad estelar vs RV planetaria)
# que sirve a la vez de documentación del formato y de default funcional. Para tu
# tema: reescribí name/short/description y, sobre todo, `relevance.topics`.
# ─────────────────────────────────────────────────────────────────────────────

name: "Separar señales de actividad estelar vs planetarias en velocidades radiales"
short: "actividad estelar vs RV planetaria"
description: >
  Reunir, por estrella y por concepto, todo lo publicado relevante (planetas,
  actividad, indicadores, métodos) para decidir si una señal de velocidad radial
  es actividad estelar o un planeta. El objetivo define qué papers entran como
  "core". Reescribí esto para tu propio tema.

# ─── Clasificador de relevancia ──────────────────────────────────────────────
# Un paper de ADS es "relevante" (= core) si matchea ≥1 topic (regex sobre
# título+abstract+keywords, case-insensitive) y su doctype no es ruido.
# Cada topic: nombre canónico → patrón regex de Python. Esto ES lo que define
# tus papers core: ajustá los patrones a tu objetivo.
relevance:
  # Comillas SIMPLES y una línea por patrón: YAML deja el string literal (sin
  # interpretar \b ni plegar saltos en espacios), así la regex llega intacta.
  topics:
    discovery: 'discover|detection of|planetary system|super-?earth|planets? orbiting|new planet|hot (jupiter|neptune)'
    rv:        'radial[ -]velocit|doppler|HARPS|ESPRESSO|HIRES|spectrograph|CCF'
    activity:  '\bactivit|magnetic|rotation|starspot|chromospher|faculae|granulation|stellar cycle|flare|S-?index|log ?R'
    planet:    '\bplanet|exoplanet|habitable|orbit|transit|mass-radius'
    method:    'gaussian process|independent component|principal component|\bICA\b|\bPCA\b|SCALPELS|YARARA|line-?by-?line|periodogram|machine learning|deconvolution|disentangl'

  # doctypes de ADS que casi siempre son ruido (menciones triviales / no-papers).
  noise_doctypes:
    - catalog
    - proposal
    - abstract
    - erratum
    - bookreview
    - newsletter
    - pressrelease
    - circular
    - software

# ─── Áreas de concepts/ ──────────────────────────────────────────────────────
# Las subcarpetas de vault/wiki/concepts/ son ABIERTAS: podés crear el área que quieras
# (investigás cualquier tema). Esta lista NO restringe — es sólo una REFERENCIA para que el
# typo-check distinga un error de tipeo (`indicatorz`) de un área nueva legítima (`granulation`):
# un `area` fuera de la lista sólo dispara un AVISO (make_notes avisa pero crea igual; el lint
# lo marca WARN), nunca bloquea. Si tu área nueva es legítima, agregala acá para silenciar el aviso.
#   · `methods` y `hypotheses` están RESERVADAS (siempre válidas): methods es universal;
#     hypotheses es estructural (schema name/status + roll-up Dataview).
#   · El resto es libre — editá la lista según el foco de TU bóveda.
concept_areas:
  - indicators
  - methods
  - activity
  - hypotheses
